services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rated_docs_backend

    command: >
      sh -c "
      python manage.py migrate &&
      gunicorn rated_docs.wsgi:application
      --bind 0.0.0.0:8004
      --workers 3
      --threads 2
      --timeout 120
      "

    volumes:
      - .:/app

    ports:
      - "8004:8004"

    env_file:
      - .env

    restart: always

